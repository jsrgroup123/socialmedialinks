<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSR Suncity Group</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
    padding:30px 20px;
}

.logo{
    width:250px;
    margin-bottom:20px;
}

h1{
    color:#0a5ea8;
    margin-bottom:10px;
}

.tagline{
    color:#ff7a00;
    font-size:18px;
    margin-bottom:30px;
}

.social-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-decoration:none;
    color:#fff;
    padding:15px;
    margin:12px 0;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.facebook{background:#1877F2;}
.instagram{
    background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4);
}
.twitter{background:#000;}
.linkedin{background:#0A66C2;}
.youtube{background:#FF0000;}

.footer{
    margin-top:30px;
    color:#666;
}
</style>
</head>
<body>

<div class="container">

    <img src="logo.png.png" alt="JSR Suncity Group" class="logo">

    <h1>JSR Suncity Group</h1>
    <p class="tagline">Land | Luxury | Lifestyle</p>

    <a class="social-btn facebook"
       href="https://www.facebook.com/jsrgroupsuncityofficial/"
       target="_blank">
       <i class="fab fa-facebook-f"></i> Facebook
    </a>

    <a class="social-btn instagram"
       href="https://www.instagram.com/jsrgroupsuncity__official/"
       target="_blank">
       <i class="fab fa-instagram"></i> Instagram
    </a>

    <a class="social-btn twitter"
       href="https://x.com/jsrgroup2"
       target="_blank">
       <i class="fa-brands fa-x-twitter"></i> X (Twitter)
    </a>

    <a class="social-btn linkedin"
       href="https://www.linkedin.com/in/jsr-group-suncity/"
       target="_blank">
       <i class="fab fa-linkedin-in"></i> LinkedIn
    </a>

    <a class="social-btn youtube"
       href="https://www.youtube.com/@jsrgroupsuncity9457"
       target="_blank">
       <i class="fab fa-youtube"></i> YouTube
    </a>

    <div class="footer">
        © 2026 JSR Suncity Group
    </div>

</div>

</body>
</html>
